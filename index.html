<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="天玑 —— 面向跨专业 AI 转型者的学习与项目共创社区。整合学习资源、工具教程、项目案例与协作空间，帮你从只会学理论，走向能做项目、会协作、能产出。" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300&family=Noto+Serif+SC:wght@300;400;500;600&family=Spline+Sans:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>天玑 · 跨专业 AI 学习与项目共创社区</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 部署更新后旧 chunk hash 失效，自动刷新一次获取最新资源
      (function () {
        var KEY = 'tianji:reloaded';
        window.addEventListener('error', function (e) {
          var target = e.target;
          if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK') && (target.src || target.href) && (target.src || target.href).includes('/assets/')) {
            if (!sessionStorage.getItem(KEY)) {
              sessionStorage.setItem(KEY, '1');
              window.location.reload();
            }
          }
        }, true);
        // 页面成功加载后清除标记，下次部署再出错才能再刷新
        window.addEventListener('load', function () {
          setTimeout(function () { sessionStorage.removeItem(KEY); }, 5000);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
