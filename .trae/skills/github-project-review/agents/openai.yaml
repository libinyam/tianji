interface:
  display_name: "GitHub Project Review"
  short_description: "Assess GitHub repositories for launch and promotion readiness with 7-role team review."
  default_prompt: "Use $github-project-review to evaluate owner/repo for promotion readiness."
  icon: "github"

agent:
  temperature: 0.3
  max_tokens: 12000

tools:
  - name: "run_command"
    description: "Execute shell commands for gh CLI, data collection, and issue creation"
  - name: "file_read"
    description: "Read local files and collected context"
  - name: "file_write"
    description: "Write the final review report"
  - name: "create_issue"
    description: "Create GitHub issues for test engineer findings via create_review_issues.py"
  - name: "team_workspace"
    description: "Initialize, check status, and clean the review team workspace via team_workspace.py"
  - name: "team_findings"
    description: "Read and write role findings via team_findings.py (write, read, summary, mark-na)"
  - name: "team_request"
    description: "Send inter-role requests and escalations, list pending items, resolve escalations via team_request.py"
  - name: "team_status"
    description: "Check team dashboard and synthesis readiness via team_status.py"
  - name: "team_synthesis"
    description: "Aggregate scores, list blockers, and generate report data via team_synthesis.py"

instructions: |
  You are a senior project review coordinator. Follow the workflow in SKILL.md strictly.

  ## Team Collaboration Protocol

  This skill uses a 7-role team with shared memory and escalation support:
  1. Initialize workspace: `team_workspace.py init --repo owner/repo`
  2. Each role writes findings via `team_findings.py write --role X --findings-file ...`
  3. Roles can escalate to each other via `team_request.py send --from A --to G --type escalation`
  4. Check readiness: `team_status.py --check-complete`
  5. Synthesize: `team_synthesis.py report-data`

  ## Seven Review Roles

  Dispatch seven parallel review agents when multi-agent tools are available:

  1. Planning Analyst (计划分析师) - roadmap, milestones, execution tracking
  2. Frontend Engineer (前端工程师) - frontend architecture, components, build, performance
  3. Backend Engineer (后端工程师) - API design, data model, error handling, observability
  4. Test Engineer (测试工程师) - test coverage, test strategy, CI gates; can create GitHub issues
  5. Code Reviewer (代码评审员) - code quality, conventions, documentation, technical debt
  6. Product & Market (产品与市场) - positioning, differentiation, community readiness
  7. Security & DevOps (安全与运维) - CI/CD, security, dependencies, compliance

  ## Rules

  - Collect context using scripts/collect_repo_context.py when available.
  - Every score must cite repository evidence.
  - Default report language: Chinese (use user's language if specified).
  - Lead with go/no-go readiness, then evidence.
  - For private repos, do not expose secrets in the report.
  - Skip inapplicable roles (e.g., frontend for a CLI-only project) and note the exclusion.
  - P0 blockers override all other scores.
  - The test engineer may use scripts/create_review_issues.py to file issues - always ask user confirmation first. Pass --yes in non-interactive (agent/CI) mode to avoid blocking on the confirmation prompt.
  - Each role checks escalation triggers and sends requests via team_request.py when triggered.
  - Escalations must be resolved before synthesis. Check team_status.py --check-complete.

references:
  - path: "references/evaluation-rubric.md"
    description: "1-10 scoring definitions for all 7 roles and P0/P1 blocker examples"
  - path: "references/report-template.md"
    description: "Final report Markdown template with 7 dimensions, escalation history, and cross-findings"
  - path: "references/collaboration-protocol.md"
    description: "Detailed escalation routing matrix, task passing rules, and worked examples"
  - path: "scripts/collect_repo_context.py"
    description: "Repository context collector script"
  - path: "scripts/create_review_issues.py"
    description: "GitHub issue creator for test engineer findings"
  - path: "scripts/team_workspace.py"
    description: "Team workspace initialization and management"
  - path: "scripts/team_findings.py"
    description: "Role findings read/write operations"
  - path: "scripts/team_request.py"
    description: "Inter-role request and escalation management"
  - path: "scripts/team_status.py"
    description: "Team status dashboard and completion checking"
  - path: "scripts/team_synthesis.py"
    description: "Score aggregation and report data generation"
  - path: "scripts/team_memory.py"
    description: "Long-term role memory and review history management"
  - path: "roles/"
    description: "Stable persona cards for the seven long-running review roles"